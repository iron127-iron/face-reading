<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>面相算命</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif TC','SimSun',serif;background:#0a0a0f;color:#e0d5c1;padding:20px;text-align:center}
h1{font-size:36px;color:#ffd700;margin:20px 0 10px;letter-spacing:8px}
.status{color:#888;margin-bottom:20px;padding:8px;border:1px solid #333;border-radius:8px;display:inline-block}
.btn{padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:8px;letter-spacing:2px}
.btn-p{background:#8b0000;color:#ffd700}
.btn-p:active{background:#cc0000}
.btn-s{background:rgba(255,255,255,0.1);color:#aaa;border:1px solid #555}
.btn-s:active{background:rgba(255,255,255,0.2)}
.area{border:2px dashed #444;border-radius:16px;padding:40px 20px;margin:20px auto;max-width:600px}
.ico{font-size:60px;margin-bottom:10px}
.hint{font-size:13px;color:#666;margin-top:10px}
.wrap{position:relative;display:inline-block;max-width:100%}
.wrap img{max-width:100%;max-height:60vh;border-radius:8px;display:block}
.wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.acts{margin-top:16px}
.fc{display:flex;align-items:center;gap:14px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,215,0,0.08);border-radius:12px;margin:8px 0}
.fi{font-size:32px}
.fb{height:6px;background:#222;border-radius:3px;margin:4px 0;overflow:hidden}
.ff{height:100%;background:linear-gradient(90deg,#8b0000,#ffd700);border-radius:3px}
.fft{display:flex;justify-content:space-between;font-size:13px}
.lv{font-size:16px;padding:4px 16px;border-radius:12px;font-weight:700}
.l1{background:rgba(0,255,136,0.2);color:#0f8}
.l2{background:rgba(255,215,0,0.2);color:#fd0}
.l3{background:rgba(255,255,255,0.1);color:#a90}
.l4{background:rgba(255,107,107,0.2);color:#f66}
.ds{font-size:12px;color:#555;margin-top:16px;padding-top:12px;border-top:1px solid #222}
input[type=file]{position:absolute;opacity:0;width:1px;height:1px}
</style>
</head>
<body>

<h1>☯ 面相算命</h1>
<div class="status" id="st">⏳ 載入中...</div>

<div id="upSec" class="area">
  <div class="ico">☯</div>
  <h3>拍照看面相</h3>
  <p style="color:#888;margin:8px 0 16px">拍攝清晰的正面照</p>
  <button class="btn btn-p" id="camBtn">📸 開啟相機拍照</button>
  <div class="hint" id="camHint"></div>
</div>

<div id="preview" style="display:none">
  <div class="wrap">
    <img id="pimg">
    <canvas id="pcan"></canvas>
  </div>
  <div class="acts">
    <button class="btn btn-s" id="retryBtn">重新拍照</button>
    <button class="btn btn-p" id="anaBtn">🔮 開始看相</button>
  </div>
</div>

<div id="results" style="display:none"></div>

<div style="margin-top:30px;color:#333;font-size:12px">面相算命 · 僅供娛樂參考</div>

<script>
var ST = document.getElementById('st');
var UP = document.getElementById('upSec');
var PRE = document.getElementById('preview');
var RES = document.getElementById('results');
var PIMG = document.getElementById('pimg');
var PCAN = document.getElementById('pcan');
var CAMBTN = document.getElementById('camBtn');
var RETRYBTN = document.getElementById('retryBtn');
var ANABTN = document.getElementById('anaBtn');
var CAMHINT = document.getElementById('camHint');
var isBusy = false;
var camStream = null;

ST.innerHTML = '✅ 就緒';
ST.style.color = '#0f8';

var sec = window.location.protocol === 'https:' || window.location.hostname === 'localhost';
if (!sec) {
  CAMHINT.textContent = '💡 相機需要 HTTPS 連線，請部署後使用';
}

function toast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#0a0a0f;border:2px solid #ffd700;color:#ffd700;padding:16px 32px;border-radius:12px;font-size:16px;box-shadow:0 8px 40px rgba(0,0,0,0.8);z-index:9999;transition:all 0.4s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 400); }, 2500);
}

function startCam() {
  if (isBusy) return;
  isBusy = true;
  CAMBTN.textContent = '⏳ 請求中...';
  CAMBTN.disabled = true;

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    CAMBTN.textContent = '📸 開啟相機拍照';
    CAMBTN.disabled = false;
    CAMHINT.textContent = '⚠️ 此瀏覽器不支援相機';
    isBusy = false;
    return;
  }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } })
    .then(function(s) {
      camStream = s;
      var v = document.createElement('video');
      v.srcObject = s;
      v.play();
      v.style.cssText = 'width:100%;max-width:500px;border-radius:8px';

      var modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center';
      modal.innerHTML = '<div style="background:#1a1a2e;border:1px solid rgba(255,215,0,0.15);border-radius:16px;padding:28px;max-width:540px;width:90%;text-align:center"><h3 style="color:#ffd700;margin-bottom:14px">📸 拍照</h3><div id="cvWrap"></div><div style="margin-top:16px;display:flex;gap:12px;justify-content:center"><button class="btn btn-s" id="cancelBtn">取消</button><button class="btn btn-p" id="captureBtn">📸 拍照</button></div></div>';
      document.body.appendChild(modal);
      document.getElementById('cvWrap').appendChild(v);

      setTimeout(function() { v.play(); }, 50);

      document.getElementById('cancelBtn').onclick = function() {
        modal.remove();
        stopCam();
      };
      document.getElementById('captureBtn').onclick = function() {
        var c = document.createElement('canvas');
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        c.toBlob(function(b) {
          modal.remove();
          stopCam();
          showPhoto(new File([b], 'photo.jpg', { type: 'image/jpeg' }));
        }, 'image/jpeg');
      };
    })
    .catch(function() {
      CAMBTN.textContent = '📸 開啟相機拍照';
      CAMBTN.disabled = false;
      CAMHINT.textContent = '⚠️ 無法開啟相機，請確認權限';
      isBusy = false;
    });
}

function stopCam() {
  if (camStream) { camStream.getTracks().forEach(function(t) { t.stop(); }); camStream = null; }
  isBusy = false;
}

function showPhoto(file) {
  var r = new FileReader();
  r.onload = function(e) {
    PIMG.src = e.target.result;
    UP.style.display = 'none';
    PRE.style.display = 'block';
    RES.style.display = 'none';
    PIMG.onload = function() {
      PCAN.style.width = PIMG.offsetWidth + 'px';
      PCAN.style.height = PIMG.offsetHeight + 'px';
    };
    toast('✅ 拍照成功！點擊「開始看相」');
  };
  r.readAsDataURL(file);
}

RETRYBTN.onclick = function() {
  PRE.style.display = 'none';
  UP.style.display = 'block';
  RES.style.display = 'none';
};

function analyze() {
  var img = PIMG;
  if (!img.src) return;
  var w = img.naturalWidth || img.width;
  var h = img.naturalHeight || img.height;
  var canvas = PCAN;
  canvas.width = w;
  canvas.height = h;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);

  var regions = [
    { id: 'forehead', label: '額頭', x: w*0.2, y: h*0.02, w: w*0.6, h: h*0.2 },
    { id: 'eyebrows', label: '眉', x: w*0.15, y: h*0.2, w: w*0.7, h: h*0.06 },
    { id: 'eyes', label: '眼', x: w*0.15, y: h*0.27, w: w*0.7, h: h*0.08 },
    { id: 'nose', label: '鼻', x: w*0.35, y: h*0.35, w: w*0.3, h: h*0.18 },
    { id: 'mouth', label: '口', x: w*0.25, y: h*0.53, w: w*0.5, h: h*0.08 },
    { id: 'chin', label: '下巴', x: w*0.2, y: h*0.62, w: w*0.6, h: h*0.25 },
    { id: 'ears', label: '耳', x: w*0.05, y: h*0.22, w: w*0.15, h: h*0.25 }
  ];
  for (var i = 0; i < regions.length; i++) {
    var r = regions[i];
    ctx.fillStyle = 'rgba(255,215,0,0.08)';
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.4;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold ' + Math.max(12, Math.round(h*0.025)) + 'px "Noto Serif TC", "SimSun", serif';
    ctx.textAlign = 'center';
    ctx.fillText(r.label, r.x + r.w/2, r.y - 4);
    ctx.globalAlpha = 1;
  }

  var m = {
    foreheadRatio: 0.24 + Math.random()*0.14,
    eyebrowGap: 0.02 + Math.random()*0.05,
    eyeRatio: 0.20 + Math.random()*0.12,
    noseRatio: 0.35 + Math.random()*0.15,
    mouthRatio: 0.28 + Math.random()*0.14,
    chinRatio: 0.20 + Math.random()*0.12,
    earRatio: 0.26 + Math.random()*0.12
  };

  var FR = {
    forehead: { name: '額頭 / 天庭', traits: [{c:function(m2){return m2.foreheadRatio>0.32},l:'額頭寬廣飽滿',t:'天庭飽滿，額頭寬廣，主聰明智慧過人，早年運勢亨通，貴人相助，學業事業皆有所成。',s:85},{c:function(m2){return m2.foreheadRatio<0.26},l:'額頭較窄',t:'額頭偏窄，早年較為辛苦，需靠自身努力奮鬥，但中年後運勢漸佳。',s:55},{c:function(m2){return m2.foreheadRatio>=0.26&&m2.foreheadRatio<=0.32},l:'額頭適中',t:'額頭大小適中，平衡發展，早年平穩，智慧與運勢中庸，靠努力可成大器。',s:70}] },
    eyebrows: { name: '眉毛 / 眉', traits: [{c:function(m2){return m2.eyebrowGap>0.05},l:'眉寬有距',t:'雙眉間距寬闊，心胸開闊，氣量大，善於交際，貴人運佳。',s:80},{c:function(m2){return m2.eyebrowGap<0.03},l:'眉近相連',t:'雙眉距離較近，個性較為執著專注，易鑽牛角尖，要注意人際關係。',s:50},{c:function(m2){return m2.eyebrowGap>=0.03&&m2.eyebrowGap<=0.05},l:'眉距適中',t:'眉毛間距標準，性格穩重，待人處事得宜，貴人運平穩。',s:65}] },
    eyes: { name: '眼睛 / 眼', traits: [{c:function(m2){return m2.eyeRatio>0.28},l:'大眼有神',t:'眼睛大而有神，熱情開朗，充滿魅力，領導力強，事業運佳。',s:85},{c:function(m2){return m2.eyeRatio<0.22},l:'小眼精明',t:'眼睛偏小但目光銳利，心思縝密，觀察力強，善於理財。',s:70},{c:function(m2){return m2.eyeRatio>=0.22&&m2.eyeRatio<=0.28},l:'眼相適中',t:'眼睛大小適中，目光穩定，為人正直，判斷力準確，福祿雙全。',s:75}] },
    nose: { name: '鼻子 / 鼻', traits: [{c:function(m2){return m2.noseRatio>0.45},l:'鼻樑挺拔',t:'鼻樑高挺直貫，財運亨通，事業有成，中年運勢極佳，能聚財守業。',s:90},{c:function(m2){return m2.noseRatio<0.38},l:'鼻樑較短',t:'鼻樑偏短，財運需靠努力積累，不宜投機，穩健理財方能致富。',s:55},{c:function(m2){return m2.noseRatio>=0.38&&m2.noseRatio<=0.45},l:'鼻相端正',t:'鼻子端正適中，財運平穩，正財運佳，一生衣食無憂。',s:70}] },
    mouth: { name: '嘴巴 / 口', traits: [{c:function(m2){return m2.mouthRatio>0.38},l:'嘴大唇厚',t:'嘴型偏大，為人豪爽大方，善於交際，食祿豐厚，一生不愁吃穿。',s:80},{c:function(m2){return m2.mouthRatio<0.30},l:'小嘴矜持',t:'嘴型偏小，個性內斂謹慎，說話有分寸，適合從事精細工作。',s:60},{c:function(m2){return m2.mouthRatio>=0.30&&m2.mouthRatio<=0.38},l:'嘴型標準',t:'嘴型大小適中，唇色紅潤，為人能言善道，人緣佳，福祿雙全。',s:75}] },
    chin: { name: '下巴 / 地閣', traits: [{c:function(m2){return m2.chinRatio>0.28},l:'下巴圓潤',t:'下巴圓潤飽滿，晚年運勢極佳，福祿雙全，子女孝順，生活安逸。',s:90},{c:function(m2){return m2.chinRatio<0.22},l:'下巴較尖',t:'下巴偏尖，晚年需靠自身積累，個性較為理想主義，要注意理財。',s:50},{c:function(m2){return m2.chinRatio>=0.22&&m2.chinRatio<=0.28},l:'下巴適中',t:'下巴大小適中，晚年平穩，一生福祿均衡。',s:70}] },
    ears: { name: '耳朵 / 耳', traits: [{c:function(m2){return m2.earRatio>0.35},l:'耳大垂厚',t:'耳朵大有垂珠，先天福氣深厚，長壽健康，一生貴人扶持。',s:90},{c:function(m2){return m2.earRatio<0.28},l:'耳小貼腦',t:'耳朵偏小，個性低調穩重，雖先天福氣略薄，但後天努力可補。',s:55},{c:function(m2){return m2.earRatio>=0.28&&m2.earRatio<=0.35},l:'耳相端正',t:'耳朵大小適中，貼腦端正，一生平順安康，福壽雙全。',s:75}] }
  };

  var features = {};
  for (var k in FR) {
    var trait = FR[k].traits[1];
    for (var j = 0; j < FR[k].traits.length; j++) {
      if (FR[k].traits[j].c(m)) { trait = FR[k].traits[j]; break; }
    }
    features[k] = { label: trait.l, text: trait.t, score: trait.s, name: FR[k].name };
  }

  var FT = [
    { id: 'career', name: '事業運', icon: '🏛️', w: { forehead:0.25,eyebrows:0.15,eyes:0.25,nose:0.2,mouth:0.05,chin:0.05,ears:0.05 } },
    { id: 'wealth', name: '財運', icon: '💰', w: { forehead:0.1,eyebrows:0.05,eyes:0.15,nose:0.5,mouth:0.1,chin:0.05,ears:0.05 } },
    { id: 'love', name: '感情運', icon: '❤️', w: { forehead:0.05,eyebrows:0.1,eyes:0.35,nose:0.1,mouth:0.25,chin:0.1,ears:0.05 } },
    { id: 'health', name: '健康運', icon: '🍃', w: { forehead:0.05,eyebrows:0.05,eyes:0.2,nose:0.15,mouth:0.15,chin:0.1,ears:0.3 } },
    { id: 'mentor', name: '貴人運', icon: '⭐', w: { forehead:0.25,eyebrows:0.25,eyes:0.15,nose:0.1,mouth:0.1,chin:0.05,ears:0.1 } }
  ];

  var fortunes = [];
  for (var i2 = 0; i2 < FT.length; i2++) {
    var ft = FT[i2];
    var s = 0;
    for (var p in ft.w) { s += (features[p] ? features[p].score : 50) * ft.w[p]; }
    var lvl = s >= 80 ? '大吉' : s >= 65 ? '吉' : s >= 50 ? '中平' : '末吉';
    fortunes.push({ name: ft.name, icon: ft.icon, score: Math.round(s), level: lvl });
  }

  var fthtml = '';
  for (var i4 = 0; i4 < fortunes.length; i4++) {
    var ff = fortunes[i4];
    var lc = ff.level === '大吉' ? 'l1' : ff.level === '吉' ? 'l2' : ff.level === '中平' ? 'l3' : 'l4';
    fthtml += '<div class="fc"><div class="fi">' + ff.icon + '</div><div style="flex:1"><div style="font-size:14px;color:#e0d5c1;margin-bottom:4px">' + ff.name + '</div><div class="fb"><div class="ff" style="width:' + ff.score + '%"></div></div><div class="fft"><span style="color:#888">' + ff.score + '分</span><span class="lv ' + lc + '">' + ff.level + '</span></div></div></div>';
  }

  var now = new Date();
  var ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');

  RES.innerHTML = '<div style="background:linear-gradient(135deg,rgba(20,15,10,0.95),rgba(10,8,5,0.95));border:1px solid rgba(255,215,0,0.15);border-radius:16px;padding:32px 24px;margin-top:20px;text-align:left"><div style="text-align:center;margin-bottom:24px"><div style="font-size:44px;color:#ffd700">☰</div><h2 style="font-size:24px;color:#ffd700;letter-spacing:6px;margin-top:4px">面相結果</h2><div style="font-size:13px;color:#666;margin-top:4px">⚡ ' + ts + '</div></div>' + fthtml + '<div class="ds">⚠️ 本分析僅供娛樂參考</div></div>';

  RES.style.display = 'block';
  RES.scrollIntoView({ behavior: 'smooth' });
}

ANABTN.onclick = analyze;
CAMBTN.onclick = startCam;
</script>
</body>
</html>
