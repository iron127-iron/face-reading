<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面相算命 - AI面相分析</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-icon">☯</div>
      <h1>面相算命</h1>
      <p class="subtitle">AI 智慧面相分析 · <span>傳統命理</span> · 即時運勢</p>
    </header>

    <!-- Status -->
    <div class="status-bar" id="modelStatus">
      <span>⏳ 載入中...</span>
    </div>

    <!-- Upload Section -->
    <section id="uploadSection" style="display:none;">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">☯</div>
        <h3>上傳照片看面相</h3>
        <p>請上傳清晰的正面照片（JPG / PNG）</p>
        <input type="file" id="photoInput" accept="image/*" onchange="handleFileUpload(event)" style="display:none">
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="document.getElementById('photoInput').click()">
            📁 選擇照片
          </button>
          <button class="btn btn-secondary" id="cameraBtn" onclick="startCamera()">
            📸 拍照
          </button>
        </div>
        <p id="cameraHint" style="font-size:12px;color:#666;margin-top:12px;display:none"></p>
      </div>
    </section>

    <!-- Results -->
    <section id="results" style="display:none;"></section>

    <!-- Share to Discord -->
    <section id="shareSection" style="display:none;">
      <div class="share-section">
        <h3>📤 分享到 Discord</h3>
        <div class="share-input-group">
          <input type="url" id="webhookUrl"
          placeholder="請輸入 Discord Webhook 網址..."
          value="https://discord.com/api/webhooks/1521349729576030379/okpV67K1t8RF3IIDKW3uHs6LN3arJ_KWLTXUvsWvF2zolsaJqmaXWImpvs4ScGCr-tpx">
        </div>
        <button class="share-btn" onclick="shareToDiscord()">
          📤 分享到 Discord
        </button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      面相算命 · AI 智慧分析 · 僅供娛樂參考
    </footer>
  </div>

  <script src="js/readings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
